<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Wiser</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #6B3FA0; --purple-light: #9B6FD0; --teal: #00C2C7;
  --yellow: #FFD600; --bg: #0D0A1E; --card: #1A1535;
  --text: #F0ECFF; --soft: #C9B8FF;
}
body {
  background: var(--bg); color: var(--text);
  font-family: "Heebo", sans-serif; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0;
  background-image: radial-gradient(1px 1px at 20% 30%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 70%, white 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 20%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 85%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 45%, white 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 10% 60%, white 0%, transparent 100%);
  opacity: 0.3; pointer-events: none; z-index: 0;
}
.container { width: 100%; max-width: 900px; padding: 20px; position: relative; z-index: 1; }
.header { text-align: center; padding: 20px 0 10px; }
.header h1 {
  font-family: "Fredoka One", cursive; font-size: 3rem;
  background: linear-gradient(135deg, var(--yellow), var(--teal));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .tagline { color: var(--soft); font-size: 1rem; margin-top: 4px; }
.character-bubble {
  display: flex; align-items: flex-end; gap: 20px; margin: 20px 0;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.owl-img {
  width: 160px; height: 160px; object-fit: cover; border-radius: 50%;
  border: 4px solid var(--purple-light); box-shadow: 0 0 30px rgba(107,63,160,0.6); flex-shrink: 0;
}
.speech-bubble {
  background: var(--card); border: 2px solid var(--purple-light);
  border-radius: 20px 20px 20px 4px; padding: 16px 20px; font-size: 1.1rem;
  line-height: 1.6; color: var(--text); position: relative;
  box-shadow: 0 4px 20px rgba(107,63,160,0.3); min-height: 80px; flex: 1;
}
.speech-bubble::after {
  content: ""; position: absolute; bottom: 14px; right: 100%;
  border: 10px solid transparent; border-right-color: var(--purple-light);
}
.stages { display: flex; gap: 10px; margin: 16px 0; justify-content: center; }
.stage-btn {
  background: var(--card); border: 2px solid var(--purple); border-radius: 14px;
  padding: 10px 16px; color: var(--soft); font-family: "Heebo", sans-serif;
  font-size: 0.85rem; text-align: center; flex: 1; transition: all 0.3s; opacity: 0.5;
}
.stage-btn.active { border-color: var(--yellow); color: var(--yellow); opacity: 1; box-shadow: 0 0 15px rgba(255,214,0,0.2); }
.stage-btn.done { border-color: var(--teal); color: var(--teal); opacity: 0.8; }
.stage-btn .emoji { font-size: 1.4rem; display: block; margin-bottom: 4px; }
.chat-area {
  background: var(--card); border: 2px solid var(--purple); border-radius: 20px;
  padding: 16px; margin: 16px 0; min-height: 200px; max-height: 300px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
}
.msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.5; animation: popIn 0.3s ease; }
@keyframes popIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
.msg.sw { background: linear-gradient(135deg,#2A1F4A,#1F2A4A); border: 1px solid var(--purple-light); align-self: flex-start; border-radius: 4px 14px 14px 14px; }
.msg.user { background: linear-gradient(135deg,#1A3A2A,#1A2A3A); border: 1px solid var(--teal); align-self: flex-end; border-radius: 14px 14px 4px 14px; color: #A0FFE0; }
.input-area { display: flex; gap: 10px; margin-top: 12px; }
.chat-input {
  flex: 1; background: var(--card); border: 2px solid var(--purple); border-radius: 16px;
  padding: 12px 16px; color: var(--text); font-family: "Heebo", sans-serif;
  font-size: 1rem; outline: none; transition: border-color 0.2s; direction: rtl;
}
.chat-input:focus { border-color: var(--teal); }
.chat-input::placeholder { color: var(--soft); opacity: 0.5; }
.send-btn {
  background: linear-gradient(135deg, var(--purple), var(--teal)); border: none;
  border-radius: 16px; width: 52px; height: 52px; cursor: pointer; font-size: 1.4rem;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(0,194,199,0.3);
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.summary-cards { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
.summary-card { background: var(--card); border: 2px solid var(--purple); border-radius: 16px; padding: 14px 18px; display: none; }
.summary-card.visible { display: block; animation: popIn 0.4s ease; }
.summary-card h3 { font-family: "Fredoka One", cursive; color: var(--yellow); font-size: 1rem; margin-bottom: 8px; }
.summary-card p { color: var(--soft); font-size: 0.9rem; line-height: 1.5; }
.reset-btn {
  background: transparent; border: 2px solid var(--purple); border-radius: 12px;
  color: var(--soft); padding: 8px 18px; cursor: pointer; font-family: "Heebo", sans-serif;
  font-size: 0.85rem; margin-top: 10px; transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.center { text-align: center; }
.loading-dots span { display: inline-block; animation: bounce 0.8s ease-in-out infinite; font-size: 1.4rem; }
.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>&#10024; SUPER WISER &#10024;</h1>
    <div class="tagline">I create heroes. You change the world! &#129417;</div>
  </div>
  <div class="character-bubble">
    <img class="owl-img" id="owlImg" alt="Super Wiser">
    <div class="speech-bubble">
      <span id="bubbleText">&#127775; שלום גיבורות וגיבורי העתיד! אני Super Wiser &#8212; המורה הכי חכם וכיפי בגלקסיה!<br>ספרו לי &#8212; איזו בעיה של ציפורים הקבוצה שלכם בחרה?</span>
    </div>
  </div>
  <div class="stages">
    <div class="stage-btn active" id="stage1btn"><span class="emoji">&#128038;</span>הבעיה</div>
    <div class="stage-btn" id="stage2btn"><span class="emoji">&#9889;</span>כוחות על</div>
    <div class="stage-btn" id="stage3btn"><span class="emoji">&#129464;</span>הגיבור</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#128640;</button>
    <input class="chat-input" id="chatInput" placeholder="כתבו כאן..." onkeydown="if(event.key==='Enter')sendMessage()">
  </div>
  <div class="summary-cards">
    <div class="summary-card" id="card1"><h3>&#128038; הבעיה שלנו:</h3><p id="card1text"></p></div>
    <div class="summary-card" id="card2"><h3>&#9889; כוחות העל הנדרשים:</h3><p id="card2text"></p></div>
    <div class="summary-card" id="card3"><h3>&#129464; הגיבור שלנו:</h3><p id="card3text"></p></div>
  </div>
  <div class="center">
    <button class="reset-btn" onclick="resetAll()">&#128260; קבוצה חדשה</button>
  </div>
</div>

  var SYSTEM_PROMPT = "אתה Super Wiser — גיבור על, קוסם ומורה חביב ומשעשע מאוד לילדות ולילדים בכיתה ב בישראל.\nאתה עוזר לילדות ולילדים לבנות מיזם יזמות על ציפורים, שלב אחר שלב.\n\nחוקים חשובים:\n- דבר עברית פשוטה מאוד, מילים קצרות, משפטים קצרים\n- היה מצחיק, חם, מעודד! פנה תמיד בלשון רבים: ספרו לי, מה בחרתם, מה דעתכם השתמש באמוג\'י הרבה\n- אם ילד או ילדה כותבים משהו לא ברור — שאל שאלה אחת פשוטה\n- תמיד תשבח אותם\n\nשלב 1 — הבעיה: עזור לילדות ולילדים לתאר את בעיית הציפורים שבחרו. שאל שאלות פשוטות.\nכשהבנת את הבעיה, סכם אותה ואמור שעוברים לשלב הבא, ואז כתוב בסוף: [STAGE1_DONE: סיכום הבעיה]\n\nשלב 2 — כוחות על: שאל אילו כוחות מיוחדים צריך הגיבור. עזור להם לחשוב על 2-3 כוחות.\nכשיש כוחות ברורים, סכם ואמור שעוברים לשלב הגיבור, ואז כתוב: [STAGE2_DONE: רשימת הכוחות]\n\nשלב 3 — הגיבור: עזור להם להמציא גיבור על. שאל את שמו, איך הוא נראה, האם הוא ציפור.\nכשהגיבור ברור, סכם ואמור כמה הם מדהימים, ואז כתוב: [STAGE3_DONE: תיאור הגיבור]";

  function updateStageBtns() {
    var btns = ["stage1btn","stage2btn","stage3btn"];
    for (var i = 0; i < btns.length; i++) {
      var btn = document.getElementById(btns[i]);
      btn.className = "stage-btn";
      if (i + 1 < stage) btn.classList.add("done");
      else if (i + 1 === stage) btn.classList.add("active");
    }
  }

  function addMsg(text, sender) {
    var area = document.getElementById("chatArea");
    var div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerHTML = text.replace(/\n/g, "<br>");
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function showLoading() {
    var area = document.getElementById("chatArea");
    var div = document.createElement("div");
    div.className = "msg sw";
    div.id = "loadingMsg";
    div.innerHTML = "<div class=\"loading-dots\"><span>&#11088;</span><span>&#11088;</span><span>&#11088;</span></div>";
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function removeLoading() {
    var el = document.getElementById("loadingMsg");
    if (el) el.remove();
  }

  function checkStageMarkers(text) {
    var m1 = text.match(/\[STAGE1_DONE:\s*([^\]]+)\]/);
    var m2 = text.match(/\[STAGE2_DONE:\s*([^\]]+)\]/);
    var m3 = text.match(/\[STAGE3_DONE:\s*([^\]]+)\]/);
    if (m1 && stage === 1) {
      document.getElementById("card1text").textContent = m1[1].trim();
      document.getElementById("card1").classList.add("visible");
      stage = 2; updateStageBtns();
    }
    if (m2 && stage === 2) {
      document.getElementById("card2text").textContent = m2[1].trim();
      document.getElementById("card2").classList.add("visible");
      stage = 3; updateStageBtns();
    }
    if (m3 && stage === 3) {
      document.getElementById("card3text").textContent = m3[1].trim();
      document.getElementById("card3").classList.add("visible");
      stage = 4; updateStageBtns();
    }
  }

  function cleanText(text) {
    return text.replace(/\[STAGE\d_DONE:[^\]]*\]/g, "").trim();
  }

  window.sendMessage = function() {
    var input = document.getElementById("chatInput");
    var btn = document.getElementById("sendBtn");
    var text = input.value.trim();
    if (!text || btn.disabled) return;
    input.value = "";
    btn.disabled = true;
    addMsg(text, "user");
    conversationHistory.push({ role: "user", content: text });
    showLoading();

    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      removeLoading();
      var raw = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : "אופס, משהו השתבש";
      checkStageMarkers(raw);
      var clean = cleanText(raw);
      conversationHistory.push({ role: "assistant", content: raw });
      addMsg(clean, "sw");
      btn.disabled = false;
      input.focus();
    })
    .catch(function() {
      removeLoading();
      addMsg("אופס! הקסם לא עבד, נסו שוב!", "sw");
      btn.disabled = false;
    });
  };

  window.resetAll = function() {
    stage = 1;
    conversationHistory = [];
    document.getElementById("chatArea").innerHTML = "";
    document.getElementById("card1").classList.remove("visible");
    document.getElementById("card2").classList.remove("visible");
    document.getElementById("card3").classList.remove("visible");
    updateStageBtns();
    document.getElementById("bubbleText").innerHTML = "קבוצה חדשה? יאללה! &#127881;<br>ספרו לי &#8212; מה הבעיה של הציפורים שלכם?";
    document.getElementById("chatInput").focus();
  };

  updateStageBtns();
  document.getElementById("chatInput").focus();
})();
</script>
</body>
</html>
